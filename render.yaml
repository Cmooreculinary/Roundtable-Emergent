services:
  - type: web
    name: roundtable-vo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: starter
    healthCheckPath: /api/
    disk:
      name: roundtable-vo-data
      mountPath: /opt/data
      sizeGB: 5
    envVars:
      - key: DB_NAME
        value: roundtable_vo
      - key: SQLITE_PATH
        value: /opt/data/roundtable_vo.sqlite3
      - key: UPLOAD_ROOT
        value: /opt/data/uploads
      - key: MAX_UPLOAD_BYTES
        value: 52428800
      - key: APP_NAME
        value: Roundtable_VO
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@roundtable.app
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: https://roundtable-vo-frontend.onrender.com
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: roundtable-vo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: roundtable-vo-backend
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
